<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>3D Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    *{margin:0;padding:0}body{background:transparent}
    model-viewer{width:100vw;height:100vh;background:transparent}
    model-viewer::part(default-progress-bar){display:none}
    #dbg{position:fixed;top:4px;left:4px;font:11px monospace;color:lime;background:rgba(0,0,0,.7);padding:4px 8px;border-radius:4px;z-index:999;pointer-events:none}
  </style>
</head>
<body>
  <div id="dbg">waiting...</div>
  <model-viewer
  src="https://raw.githubusercontent.com/albertjcg-glitch/test/main/3d_profile_card.glb"
  id="mv"
  camera-controls
  camera-orbit="266deg 43deg auto"
  shadow-intensity="1.72"
  exposure="1.32"
  tone-mapping="neutral"
  interaction-prompt="none"
  disable-zoom
  ></model-viewer>
  <script>
    var d=document.getElementById('dbg');
    var mv=document.getElementById('mv');
    d.textContent='script ran';

    mv.addEventListener('load',function(){
      d.textContent='load fired';
      mv.interpolationDecay=800;
      mv.setAttribute('camera-orbit','0deg 90deg auto');
      setTimeout(function(){
        d.textContent='auto-rotate on';
        mv.autoRotate=true;
        mv.rotationPerSecond='5deg';
      },4000);
    });

    // Fallback: check every 200ms
    var tries=0;
    var poll=setInterval(function(){
      tries++;
      d.textContent='poll #'+tries+' loaded='+mv.loaded+' getCam='+(typeof mv.getCameraOrbit);
      if(typeof mv.getCameraOrbit==='function' && mv.modelIsVisible){
        clearInterval(poll);
        d.textContent='poll triggered intro';
        mv.interpolationDecay=800;
        mv.setAttribute('camera-orbit','0deg 90deg auto');
        setTimeout(function(){
          mv.autoRotate=true;
          mv.rotationPerSecond='5deg';
          d.textContent='done';
        },4000);
      }
      if(tries>100)clearInterval(poll);
    },200);
  </script>
</body>
</html>
