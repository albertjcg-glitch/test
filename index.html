<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>3D Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    *{margin:0;padding:0}body{background:transparent}
    model-viewer{width:100vw;height:100vh;background:transparent}
    model-viewer::part(default-progress-bar){display:none}
  </style>
</head>
<body>
  <model-viewer
  src="https://raw.githubusercontent.com/albertjcg-glitch/test/main/3d_profile_card.glb"
  id="mv"
  camera-controls
  camera-orbit="266deg 43deg auto"
  shadow-intensity="1.72"
  exposure="1.32"
  tone-mapping="neutral"
  interaction-prompt="none"
  disable-zoom
  ></model-viewer>
  <script>
    var mv=document.getElementById('mv');
    var done=false,itid;

    mv.addEventListener('camera-change',function(e){
      if(!done&&e.detail.source==='user-interaction'){
        clearTimeout(itid);done=true;mv.interpolationDecay=85;
      }
    });

    var poll=setInterval(function(){
      if(typeof mv.getCameraOrbit==='function'&&mv.modelIsVisible){
        clearInterval(poll);
        mv.resetTurntableRotation();
        mv.interpolationDecay=800;
        mv.setAttribute('camera-orbit','0deg 90deg auto');

        setTimeout(function(){
          done=true;
          mv.autoRotate=true;
          mv.rotationPerSecond='5deg';
        },4000);

        setTimeout(function(){
          mv.interpolationDecay=85;
        },4000);
      }
    },200);
  </script>
</body>
</html>
