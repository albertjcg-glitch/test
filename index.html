<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>3D Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    *{margin:0;padding:0}body{background:transparent}
    model-viewer{width:100vw;height:100vh;background:transparent}
    model-viewer::part(default-progress-bar){display:none}
  </style>
</head>
<body>
  <model-viewer
  src="https://raw.githubusercontent.com/albertjcg-glitch/test/main/3d_profile_card.glb"
  id="mv"
  alt="3D Model"
  camera-controls
  camera-orbit="266deg 43deg auto"
  min-camera-orbit="0deg 0deg auto"
  max-camera-orbit="360deg 180deg auto"
  shadow-intensity="1.72"
  exposure="1.32"
  tone-mapping="neutral"
  interaction-prompt="none"
  disable-zoom
  ></model-viewer>
  <script>
    const mv=document.getElementById('mv');
  let done=false,itid;
  mv.addEventListener('camera-change',(e)=>{if(!done&&e.detail.source==='user-interaction'){clearTimeout(itid);done=true;mv.interpolationDecay=85;}});
  mv.addEventListener('load',()=>{
    mv.resetTurntableRotation?.();
    mv.interpolationDecay=800;
    mv.setAttribute('camera-orbit','0deg 90deg auto');
    let rrs=null;(function rollTick(ts){if(!rrs)rrs=ts;const t=Math.min((ts-rrs)/4000,1);const e=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;const r=-32.5+(0--32.5)*e;mv.style.transform='rotate('+r.toFixed(3)+'deg)';if(t<1)requestAnimationFrame(rollTick);else mv.style.transform='';})(performance.now());
    itid=setTimeout(()=>{
      done=true;
      mv.interpolationDecay=800;setTimeout(()=>mv.interpolationDecay=85,1400);
    },4000);
    setTimeout(()=>{mv.setAttribute('auto-rotate','');mv.setAttribute('rotation-per-second','5deg');},0);
  });
  </script>
</body>
</html>
