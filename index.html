<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; }
    body { background: transparent; }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: transparent;
    }

    model-viewer::part(default-progress-bar) {
      display: none;
    }
  </style>
</head>
<body>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <model-viewer
    id="card"
    src="https://raw.githubusercontent.com/albertjcg-glitch/test/main/3d_profile_card.glb"
    camera-controls
    tone-mapping="neutral"
    shadow-intensity="1.72"
    exposure="1.32"
    camera-orbit="100deg 45deg auto"
    disable-zoom
    interaction-prompt="none">
  </model-viewer>

  <script>
    const viewer = document.getElementById('card');

    viewer.addEventListener('load', () => {
      viewer.interpolationDecay = 800;
      viewer.setAttribute('camera-orbit', '0deg 90deg auto');

      setTimeout(() => {
        viewer.interpolationDecay = 50;
        viewer.autoRotate = true;
        viewer.rotationPerSecond = '5deg';
      }, 2500);
    });
  </script>
</body>
</html>
